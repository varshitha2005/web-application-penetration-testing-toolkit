<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="homepage">

<div class="card">
    <h2>Login</h2>

    <p>Don't have account? <a href="/signup">Sign Up</a></p>
</div>

</body>
</html>
